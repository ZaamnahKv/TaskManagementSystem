<!DOCTYPE html>
<html>
<head>
    <title>Add Meeting</title>
    <link rel="stylesheet" href="../css/add.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>
<body>
<div class="container">
    <div class="header">
        <h2><i class="bi bi-plus-circle"></i> Add Meeting</h2>
    </div>
    <form>
        <div class="box">
            <label>Meeting Title *</label>
            <input type="text" id="meetingtitle" placeholder="Enter title">
        </div>
        <div class="box">
            <label>Meeting Type *</label>
            <select id="meetingytpe">
               <option>Select</option>
               <option>cochin vendor</option>
               <option>PMDG</option>
               <option>Internal meeting</option>
            </select> 
        </div>
        <div class="row">
            <div class="field">
                <label>Meeting Date *</label>
                <input type="date" id="meetingdate">
            </div>
            <div class="field">
                <label>Start Time *</label>
                <input type="time" id="starttime">
            </div>
             <div class="field">
                <label>End Time *</label>
                <input type="time" id="endtime">
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Duration hours</label>
                <input type="text" id="dhrs">
            </div>
            <div class="field">
                <label>Meeting Organiser *</label>
                <select id="organiser">
                    <option>Select Organiser </option>
                    <option>Shrikanth</option>
                    <option>Ram</option>
                    <option>Palanivel</option>
                </select>
            </div>
        </div>
             <div class="row">
            <div class="field">
                <label>Description *</label>
                 <textarea id="description" placeholder="Enter description"></textarea>
            </div>
             </div>
        <div class="buttons">
            <button type="submit" id="savebtn" class="save-btn">Save</button>
            <button type="reset" id="cancelbtn" class="cancel-btn">Cancel</button>
        </div>
    </form>
</div>
<script src="../js/add.js"></script>
</body>
</html>
