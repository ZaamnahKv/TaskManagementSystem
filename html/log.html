<!DOCTYPE html>
<html>
<head>
    <title>Work Logs</title>
    <link rel="stylesheet" href="../css/log.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
    <div class="main">
        <div class="header">
            <div>
                <h1>Work Logs</h1>
            </div>
        </div>
        <div class="filters">
            <input type="date">
            <select>
                <option>All Employees</option>
                <option>Sriman</option>
                <option>Shrikanth</option>
                <option>Jayasri</option>
                <option>Karthick</option>
            </select>
            <select>
                <option>All Tasks</option>
                <option>UI Design</option>
                <option>API Integration</option>
                <option>Testing Module</option>
                <option>Documentation</option>
                <option>Database Update</option>
            </select>
            <select>
                <option>All Status</option>
                <option>Open</option>
                <option>Completed</option>
                <option>Pending</option>
                <option>Overdue</option>
            </select>
            <input type="text" placeholder="Search Work Logs">
        </div>
        <div class="cards">
            <div class="card">
                <i class="fa-regular fa-file-lines green"></i>
                <div>
                    <p>Total Logs</p>
                    <h2>28</h2>
                </div>
            </div>
            <div class="card">
                <i class="fa-regular fa-clock purple"></i>
                <div>
                    <p>Total Hours</p>
                    <h2>78.5</h2>
                </div>
            </div>
            <div class="card">
                <i class="fa-regular fa-user blue"></i>
                <div>
                    <p>Active Employees</p>
                    <h2>4</h2>
                </div>
            </div>
            <div class="card">
                <i class="fa-solid fa-chart-line orange"></i>
                <div>
                    <p>Avg Hours / Day</p>
                    <h2>6.54</h2>
                </div>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Employee</th>
                        <th>Task</th>
                        <th>Description</th>
                        <th>Hours</th>
                        <th>Status</th>
                        <th>Logged At</th>
                    </tr>
                </thead>
                <tbody id="workLogTable"></tbody>
            </table>
        </div>
    </div>
    <script src="../js/log.js"></script>
</body>
</html>
