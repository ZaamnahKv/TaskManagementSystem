<!DOCTYPE html>
<html>
<head>
    <title>Add New Task</title>
    <link rel="stylesheet" href="../css/addtask.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h2><i class="bi bi-person-plus"></i> Add New Task</h2>
    </div>
    <form>
        <div class="box">
            <label>Title *</label>
            <input type="text" id="title" placeholder="Enter task title">
        </div>
        <div class="box">
            <label>Description</label>
            <textarea  id="description" placeholder="Enter description"></textarea>
        </div>
        <div class="row">
            <div class="field">
                <label>Assigned To *</label>
                <select id="assignedto">
                    <option>Select User</option>
                    <option>ShriKanth</option>
                    <option>Sriman</option>
                     <option>Jayasri</option>
                      <option>Karthick</option>
                </select>
            </div>
            <div class="field">
                <label>Priority *</label>
                <select id="priority">
                    <option>Select Priority</option>
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Start Date</label>
                <input type="date" id="startdate">
            </div>
            <div class="field">
                <label>Due Date *</label>
                <input type="date" id="duedate">
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Status *</label>
                <select id="status">
                    <option>Select Status</option>
                    <option>Open</option>
                    <option>In Progress</option>
                    <option>Completed</option>
                    <option>Pending</option>
                </select>
            </div>
        </div>
        <div class="buttons">
            <button type="submit" class="save-btn" id="savebtn">Save</button>
            <button type="reset" class="cancel-btn" id="cancelbtn">Cancel</button>
        </div>
    </form>
</div>
<script src="../js/addtask.js"></script>
</body>
</html>
